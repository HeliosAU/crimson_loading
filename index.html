<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Knight Gaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    
    <div class="ui-panel">
        <div class="header-box">
            <h1 class="glitch-title">CRIMSON KNIGHT</h1>
            <h2 class="subtitle">IMPERIAL ROLEPLAY</h2>
            <div class="aurebesh-sub">IMPERIAL SECURITY BUREAU DATANET</div>
        </div>
        
        <div class="status-box">
            <div class="aurebesh-bg">GLORY TO THE EMPIRE</div>
            <div id="status">Establishing secure HoloNet uplink...</div>
            
            <div class="progress-container">
                <div id="progress-fill" class="progress-bar"></div>
            </div>
            
            <div class="file-counter">
                DATA TRANSMITTED: <span id="files">0 / 0</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
